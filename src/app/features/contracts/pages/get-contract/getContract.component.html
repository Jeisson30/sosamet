<div class="grid gestion-grid">
  <div class="col-12">
    <p-card class="gestion-card">
      <ng-template pTemplate="header">
        <div class="card-header">
          <span class="card-title">Contratos</span>
          <div class="card-actions">
            <button
              pButton
              icon="pi pi-plus"
              label="Nuevo"
              class="btn-primary"
              (click)="onNuevoContrato()">
            </button>
            <button
              pButton
              icon="pi pi-search"
              label="Consultar"
              class="btn-secondary"
              (click)="onConsultarContrato()">
            </button>
          </div>
        </div>
      </ng-template>
    </p-card>
  </div>

  <div class="col-12">
    <p-card class="gestion-card">
      <ng-template pTemplate="header">
        <div class="card-header">
          <span class="card-title">Asistencia</span>
          <div class="card-actions">
            <button
              pButton
              icon="pi pi-plus"
              label="Nuevo"
              class="btn-primary"
              (click)="onNuevoAsistencia()">
            </button>
            <button
              pButton
              icon="pi pi-search"
              label="Consultar"
              class="btn-secondary"
              (click)="onConsultarAsistencia()">
            </button>
          </div>
        </div>
      </ng-template>
    </p-card>
  </div>

  <div class="col-12">
    <p-card class="gestion-card">
      <ng-template pTemplate="header">
        <div class="card-header">
          <span class="card-title">Actas de Medida</span>
          <div class="card-actions">
            <button
              pButton
              icon="pi pi-plus"
              label="Nuevo"
              class="btn-primary"
              (click)="onNuevoActaMedida()">
            </button>
            <button
              pButton
              icon="pi pi-search"
              label="Consultar"
              class="btn-secondary"
              (click)="onConsultarActaMedida()">
            </button>
          </div>
        </div>
      </ng-template>
    </p-card>
  </div>

  <div class="col-12">
    <p-card class="gestion-card">
      <ng-template pTemplate="header">
        <div class="card-header">
          <span class="card-title">Órdenes de Compra</span>
          <div class="card-actions">
            <button
              pButton
              icon="pi pi-plus"
              label="Nuevo"
              class="btn-primary"
              (click)="onNuevoOrdenCompra()"
              disabled>
            </button>
            <button
              pButton
              icon="pi pi-search"
              label="Consultar"
              class="btn-secondary"
              (click)="onConsultarOrdenCompra()"
              disabled>
            </button>
          </div>
        </div>
      </ng-template>
    </p-card>
  </div>

  <div class="col-12">
    <p-card class="gestion-card">
      <ng-template pTemplate="header">
        <div class="card-header">
          <span class="card-title">Remisiones</span>
          <div class="card-actions">
            <button
              pButton
              icon="pi pi-plus"
              label="Nuevo"
              class="btn-primary"
              (click)="onNuevoRemision()">
            </button>
            <button
              pButton
              icon="pi pi-search"
              label="Consultar"
              class="btn-secondary"
              (click)="onConsultarRemision()">
            </button>
          </div>
        </div>
      </ng-template>
    </p-card>
  </div>

  <div class="col-12">
    <p-card class="gestion-card">
      <ng-template pTemplate="header">
        <div class="card-header">
          <span class="card-title">Actas de Pago</span>
          <div class="card-actions">
            <button
              pButton
              icon="pi pi-plus"
              label="Nuevo"
              class="btn-primary"
              (click)="onNuevoActaPago()">
            </button>
            <button
              pButton
              icon="pi pi-search"
              label="Consultar"
              class="btn-secondary"
              (click)="onConsultarActaPago()">
            </button>
          </div>
        </div>
      </ng-template>
    </p-card>
  </div>
</div>
